<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasindu | Portfolio Links</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ================= BASE ================= */
:root {
    --bg-color: #050b14;
    --card-bg: #0d1420;
    --btn-bg: #111b29;
    --btn-border: #1e2d40;
    --accent-color: #3b82f6;
    --text-main: #ffffff;
    --text-muted: #8ab4f8;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    height: 100vh;
    overflow: hidden;
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Background Glow */
body::before, body::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(25,45,80,0.4) 0%, transparent 70%);
    z-index: 0;
}

body::before {
    top: -200px;
    left: -100px;
}

body::after {
    bottom: -200px;
    right: -100px;
}

/* ================= CONTAINER ================= */
.profile-container {
    display: flex;
    gap: 40px;
    max-width: 900px;
    width: 90%;
    height: 90vh;
    align-items: center;
    justify-content: center;
    z-index: 1;
}

/* ================= IMAGE ================= */
.image-section {
    width: 260px;
    height: 260px;
    border-radius: 24px;
    padding: 5px;
    background: linear-gradient(135deg, rgba(59,130,246,0.2), transparent);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.image-section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 20%; /* PERFECT FACE CROP */
    border-radius: 20px;
}

/* ================= INFO ================= */
.info-section {
    flex-grow: 1;
}

.name {
    font-size: 2.2rem;
    font-weight: 700;
}

.title {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 20px;
}

.divider {
    border: 0;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
    margin-bottom: 20px;
}

.connect-heading {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.connect-heading::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--accent-color);
}

/* ================= LINKS ================= */
.links-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.link-btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    padding: 12px 16px;
    border-radius: 10px;
    text-decoration: none;
    color: var(--text-main);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.link-content {
    display: flex;
    align-items: center;
    gap: 10px;
}

.link-btn i.icon-main {
    color: var(--text-muted);
}

.link-btn i.fa-chevron-right {
    font-size: 0.8rem;
    color: #4a5568;
}

/* Hover */
.link-btn:hover {
    background: #1a283c;
    border-color: var(--accent-color);
    transform: translateY(-2px);
}

.link-btn:hover i.icon-main,
.link-btn:hover i.fa-chevron-right {
    color: var(--accent-color);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
    body {
        overflow: auto;
        height: auto;
    }

    .profile-container {
        flex-direction: column;
        height: auto;
        padding: 40px 0;
        text-align: center;
    }

    .links-grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="profile-container">

    <!-- IMAGE -->
    <div class="image-section">
        <img src="pic4.jpg" alt="Pasindu" style="background-color: #1e2d40;">
    </div>

    <!-- INFO -->
    <div class="info-section">
        <h1 class="name">Pasindu Sandeepa</h1>
        <p class="title">Cybersecurity Enthusiast | Penetration Tester<br></p>

        <hr class="divider">

        <h2 class="connect-heading">Connect</h2>

        <div class="links-grid">

            <a href="portfolio.html" class="link-btn">
                <span class="link-content"><i class="fas fa-user icon-main"></i> About Me</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://pasindu-sd.github.io/writeups-blog/" class="link-btn">
                <span class="link-content"><i class="fas fa-blog icon-main"></i> Blog</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="mailto:dilharawijesinghe86@gmail.com" class="link-btn">
                <span class="link-content"><i class="fas fa-envelope icon-main"></i> Email</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://youtube.com/@pasindusandeepa" class="link-btn">
                <span class="link-content"><i class="fab fa-youtube icon-main"></i> YouTube</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://www.linkedin.com/in/pasindu-sandeepa-cybersecurity" class="link-btn">
                <span class="link-content"><i class="fab fa-linkedin icon-main"></i> LinkedIn</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://github.com/Pasindu-sd" class="link-btn">
                <span class="link-content"><i class="fab fa-github icon-main"></i> GitHub</span>
                <i class="fas fa-chevron-right"></i>
            </a>

        </div>
    </div>

</div>

</body>
</html>
